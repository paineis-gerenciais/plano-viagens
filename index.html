function cityRecordForDate(date){if(!date)return null;let strict=state.cities.find(c=>date>=c.start&&date<c.end);if(strict)return strict;let checkout=state.cities.slice().sort((a,b)=>(b.end||'').localeCompare(a.end||'')).find(c=>date===c.end);return checkout||null}

function allPlanningDates(){let map=new Map();datesFromCities().forEach(d=>map.set(d.date,d.city));[...state.foodItems,...state.attractions,...state.otherExpenses].forEach(x=>{if(x.date&&!map.has(x.date))map.set(x.date,x.city||inferCityForDate(x.date)||'')});state.transports.forEach(x=>{let d=getTransportDate(x);if(d&&!map.has(d))map.set(d,inferCityForDate(d)||getTransportDest(x)||getTransportOrigin(x)||'')});return [...map.entries()].map(([date,city])=>({date,city:city||inferCityForDate(date)||''})).sort((a,b)=>a.date.localeCompare(b.date))}
function mainCities(){let max=0,names=[];state.cities.forEach(c=>{let d=daysBetween(c.start,c.end);if(d>max){max=d;names=[c.city]}else if(d===max&&d>0&&!names.includes(c.city)){names.push(c.city)}});return names.filter(Boolean)}function autoTitle(){let names=mainCities();return names.length?'Planejamento da Viagem - '+names.join(', '):'Planejamento da Viagem'}function regenerateTitle(){state.settings.manualTitle=false;state.settings.title=autoTitle();renderAll(false);persistDraft()}
function sortCitiesByDate(){state.cities.sort((a,b)=>{let da=a.start||'9999-12-31',db=b.start||'9999-12-31';let cmp=da.localeCompare(db);if(cmp)return cmp;cmp=(a.end||'9999-12-31').localeCompare(b.end||'9999-12-31');if(cmp)return cmp;return String(a.city||'').localeCompare(String(b.city||''),'pt-BR')})}function ensureGenerated(){sortCitiesByDate();const dates=datesFromCities();dates.forEach(({date,city})=>{if(!state.foodItems.some(x=>x.date===date)){['Café da manhã','Almoço','Jantar','Mercado','Outros'].forEach(type=>state.foodItems.push({id:uid(),date,city,type,place:'',cost:0,status:'Planejado'}))}if(!state.attractions.some(x=>x.date===date)){state.attractions.push({id:uid(),date,city,time:'09:00',period:'Manhã',name:'',cost:0,status:'Planejado'})}if(!state.otherExpenses.some(x=>x.date===date)){state.otherExpenses.push({id:uid(),date,city,name:'',cost:0,status:'Planejado'})}});['foodItems','attractions','otherExpenses'].forEach(k=>state[k].forEach(x=>{x.city=cityForDate(x.date)||x.city}));state.attractions.forEach(x=>x.period=periodByTime(x.time))}

function renderResumo(){const t=totals(),dates=allPlanningDates(),cs=checklistStats(),trav=Math.max(1,num(state.settings.travelers)||1);document.getElementById('resumo').innerHTML=`<h2>Resumo</h2><div class="grid grid4"><div class="card kpi"><span>Dias</span><strong>${dates.length}</strong></div><div class="card kpi"><span>Cidades únicas</span><strong>${uniqueCities().length}</strong></div><div class="card kpi"><span>Custo total</span><strong>${money(t.total)}</strong></div><div class="card kpi"><span>Custo por pessoa</span><strong>${money(t.total/trav)}</strong></div></div><br><div class="grid grid2"><div class="card"><h3>Configurações rápidas</h3><label>Número de viajantes<input type="number" min="1" value="${trav}" onchange="state.settings.travelers=Math.max(1,num(this.value));renderAll(false);persistDraft()"></label><br><br><button class="small-btn ghost" onclick="regenerateTitle()">Regerar título automático</button> <button class="small-btn ghost" onclick="state.settings.subtitle=subtitles[Math.floor(Math.random()*subtitles.length)];renderAll(false);persistDraft()">Nova frase poética</button></div><div class="card"><h3>Status geral</h3><p><b>Média por dia:</b> ${money(t.total/(dates.length||1))}</p><p><b>Média por pessoa/dia:</b> ${money(t.total/(trav*(dates.length||1)))}</p><p><b>Checklist:</b> ${cs.pct}% concluído (${cs.done}/${cs.active})</p><p><b>Itens pagos:</b> ${paidPct()}%</p></div></div><br><div class="card"><h3>Resumo do roteiro</h3>${dates.length?`<p>A viagem passa por <b>${uniqueCities().join(', ')}</b>, de ${fmtDate(dates[0].date)} a ${fmtDate(dates.at(-1).date)}, com custo estimado de <b>${money(t.total)}</b>.</p>`:`<p class="empty">Comece cadastrando uma cidade na tela Cidades. Após cadastrar datas, as demais telas serão geradas automaticamente.</p>`}</div>`}

function renderRoteiro(){const dates=allPlanningDates();document.getElementById('roteiro').innerHTML=`<h2>Roteiro</h2><p class="hint">Consolidado automático sem valores, organizado por período, incluindo transportes, alimentação, atrações, hospedagem e outros registros.</p>${dates.length?dates.map(d=>renderRouteDay(d)).join(''):`<p class="empty">Cadastre cidades ou transportes para gerar o roteiro.</p>`}`}
function renderRouteDay(d){
  const date=d.date,
        c=cityRecordForDate(date),
        trans=state.transports.filter(x=>getTransportDate(x)===date&&!isCanceled(x)).sort((a,b)=>(a.time||'').localeCompare(b.time||'')),
        food=state.foodItems.filter(x=>x.date===date&&!isCanceled(x)).sort((a,b)=>foodOrder(a.type)-foodOrder(b.type)),
        attr=state.attractions.filter(x=>x.date===date&&!isCanceled(x)).sort((a,b)=>(a.time||'').localeCompare(b.time||'')),
        other=state.otherExpenses.filter(x=>x.date===date&&!isCanceled(x));
  const transportLine=x=>{
    const parts=[];
    const origin=getTransportOrigin(x)||'Origem';
    const dest=getTransportDest(x)||'Destino';
    parts.push(`${x.time||''} — 🚆 ${safe(getTransportMode(x))}: ${safe(origin)} → ${safe(dest)}`);
    if(getTransportDuration(x))parts.push(`Tempo: ${safe(getTransportDuration(x))}`);
    if(x.notes)parts.push(`Obs.: ${safe(x.notes)}`);
    return parts.join(' · ');
  };
  const attractionLine=x=>`${x.time||''} — 🎟️ ${safe(x.name)||'Atração'}`;
  const foodLine=x=>`🍽️ ${safe(x.type||'Refeição')}${x.place?' — '+safe(x.place):''}`;
  const periodItems=p=>[
      ...food.filter(x=>p==='Manhã'?String(x.type||'').toLowerCase().includes('café'):p==='Almoço'?String(x.type||'').toLowerCase().includes('almoço'):p==='Jantar'?String(x.type||'').toLowerCase().includes('jantar'):false).map(foodLine),
      ...attr.filter(x=>periodByTime(x.time)===p).map(attractionLine),

    ].filter(Boolean).join('<br>')||'-';

}
function gmaps(points){points=points.map(p=>String(p||'').trim()).filter(Boolean);if(points.length<2)return 'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(points[0]||'');const origin=encodeURIComponent(points[0]),dest=encodeURIComponent(points.at(-1)),ways=points.slice(1,-1).map(encodeURIComponent).join('|');return `https://www.google.com/maps/dir/?api=1&origin=${origin}&destination=${dest}${ways?'&waypoints='+ways:''}`}
function normalizeMapLocation(v){return String(v||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/^(origem|destino|saida|chegada)\s*[:\-]\s*/,'').replace(/\s+/g,' ').replace(/[.,;:]+$/g,'').trim()}
function dedupeConsecutiveMapPoints(pts){let out=[],last='';pts.forEach(p=>{let key=normalizeMapLocation(p.locKey||p.query||p.label);if(!key)return;if(key!==last){out.push(p);last=key}});return out}
function transportMapInfo(x,kind){
  const parts=[];
  const place=kind==='Saída'?(getTransportOrigin(x)||'Origem'):(getTransportDest(x)||'Destino');
  parts.push(`${x.time||''} — 🚆 ${safe(getTransportMode(x))} · ${kind}: ${safe(place)}`);
  if(getTransportDuration(x))parts.push(`Tempo: ${safe(getTransportDuration(x))}`);
  if(x.notes)parts.push(`Obs.: ${safe(x.notes)}`);
  return parts.join(' · ');

function dayMapPoints(date,period=null){
  let pts=[],city=inferCityForDate(date),seq=0;
  let c=cityRecordForDate(date);
  const add=(time,label,query,kind='',locKey='')=>{label=String(label||'').trim();query=String(query||label||'').trim();locKey=String(locKey||query||label||'').trim();if(label||query)pts.push({time:time||'',label,query,kind,locKey,seq:seq++})};
  const hotelQuery=(c&&c.hotel)?`${c.hotel}, ${city||c.city||''}`:'';
  const hotelLabel=(c&&c.hotel)?`🏨 ${c.hotel}`:'';
  if(hotelQuery&&(!period||period==='Manhã'))add('07:00',hotelLabel,hotelQuery,'hospedagem-inicio',c.hotel);
  state.foodItems.filter(x=>x.date===date&&x.place&&!isCanceled(x)).forEach(x=>add(x.type.includes('Almoço')?'12:30':(x.type.includes('Jantar')?'19:30':'08:00'),`🍽️ ${x.place}`,`${x.place}, ${city}`,'alimentacao',x.place));
  state.attractions.filter(x=>x.date===date&&x.name&&!isCanceled(x)).forEach(x=>add(x.time||'09:00',`🎟️ ${x.name}`,`${x.name}, ${city}`,'atracao',x.name));
  state.transports.filter(x=>getTransportDate(x)===date&&!isCanceled(x)).sort((a,b)=>(a.time||'').localeCompare(b.time||'')).forEach(x=>{
    const t=x.time||'09:00';
    const origin=getTransportOrigin(x),dest=getTransportDest(x);
    if(origin) add(t,transportMapInfo(x,'Saída'),origin,'transporte-origem',origin);
    if(dest) add(t,transportMapInfo(x,'Chegada'),dest,'transporte-destino',dest);
  });
  if(hotelQuery&&(!period||period==='Noite'))add('23:59',hotelLabel,hotelQuery,'hospedagem-fim',c.hotel);
  pts=pts.sort((a,b)=>((a.time||'').localeCompare(b.time||''))||(a.seq-b.seq));
  if(period)pts=pts.filter(p=>periodByTime(p.time)===period||p.kind==='hospedagem-inicio'||p.kind==='hospedagem-fim');
  pts=dedupeConsecutiveMapPoints(pts);
  if(!pts.length&&city)pts.push({time:'',label:city,query:city,kind:'cidade'});
  return pts
}
function renderMapa(){const dates=allPlanningDates();document.getElementById('mapa').innerHTML=`<h2>Mapa</h2><p class="hint">Links do Google Maps gerados por dia, com hospedagem no primeiro e no último ponto da rota e transporte em duas linhas consecutivas: saída e chegada.</p>${dates.length?`<div class="grid grid2">${dates.map(d=>{const pts=dayMapPoints(d.date);return `<div class="card map-card"><h3>${fmtDate(d.date)} — ${safe(d.city||inferCityForDate(d.date)||'')}</h3><div class="map-points">${pts.map(p=>`<div class="map-point"><b>${p.time}</b> ${safe(p.label)}</div>`).join('')}</div><div class="toolbar"><a class="linkbtn" target="_blank" href="${gmaps(pts.map(p=>p.query))}">Rota completa</a>${['Manhã','Tarde','Noite'].map(p=>`<a class="linkbtn ghost" target="_blank" href="${gmaps(dayMapPoints(d.date,p).map(x=>x.query))}">${p}</a>`).join('')}</div></div>`}).join('')}</div>`:`<p class="empty">Cadastre cidades, transportes e pontos do roteiro para gerar links de mapa.</p>`}`}
function suggestEmoji(city=''){let name=city.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');let map=[['lisboa','🏛️'],['porto','🌉'],['madri','🎨'],['barcelona','⛪'],['paris','🗼'],['londres','🎡'],['roma','🏟️'],['toquio','🗼'],['tokyo','🗼'],['seul','🏯'],['new york','🗽'],['nova york','🗽'],['orlando','🎢'],['miami','🏖️'],['cancun','🏝️'],['rio','🌊'],['belo horizonte','⛰️'],['sao paulo','🏙️'],['buenos aires','💃'],['santiago','🏔️'],['cusco','🦙'],['dubai','🏜️']];let found=map.find(([k])=>name.includes(k));return found?found[1]:['📍','🏙️','🌆','🌉','🏛️','⛪','🏖️','🏔️','🌊','🚉','✈️','🧭'][Math.floor(Math.random()*12)]}function reflexive(){let arr=['Reserve um tempo para caminhar sem pressa e perceber o ritmo da cidade.','Escolha um momento do dia para observar a cidade sem roteiro definido.','Experimente uma refeição típica e anote o que tornou esse lugar especial.','Procure um mirante, uma praça ou uma rua tranquila para guardar uma memória simples.','Permita-se descobrir algo fora do planejamento.','Observe os sons, cheiros e detalhes que tornam esta cidade única.','Faça uma pausa para registrar o que esta etapa da viagem está despertando em você.'];return arr[Math.floor(Math.random()*arr.length)]}function cityAttractions(c){return state.attractions.filter(x=>x.city===c).length}function cityFoods(c){return state.foodItems.filter(x=>x.city===c&&x.place).length}function cityOthers(c){return state.otherExpenses.filter(x=>x.city===c&&x.name).length}
function renderCidades(){const totalNights=state.cities.reduce((s,c)=>s+daysBetween(c.start,c.end),0),main=mainCities(),t=totals();document.getElementById('cidades').innerHTML=`<h2>Cidades</h2><div class="grid grid4"><div class="card kpi"><span>Cidades únicas</span><strong>${uniqueCities().length}</strong></div><div class="card kpi"><span>Total de diárias</span><strong>${totalNights}</strong></div><div class="card kpi"><span>Cidade principal</span><strong>${main.join(', ')||'-'}</strong></div><div class="card kpi"><span>Hospedagem total</span><strong>${money(t.lodging)}</strong></div></div><br><div class="toolbar"><button onclick="addCity()">Adicionar cidade</button></div>${state.cities.length?`<div class="card"><h3>Distribuição da viagem</h3>${state.cities.map(c=>{let pct=totalNights?Math.round(daysBetween(c.start,c.end)/totalNights*100):0;return `<div class="progress-row"><b>${safe(c.city)}</b><div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div><span>${pct}%</span></div>`}).join('')}</div><br><div class="grid grid2">${state.cities.map((c,i)=>renderCityCard(c,i,totalNights,main)).join('')}</div>`:`<p class="empty">Comece adicionando uma cidade. As demais telas serão geradas a partir das datas de check-in e check-out.</p>`}`}function renderCityCard(c,i,totalNights,main){const nights=daysBetween(c.start,c.end),total=nights*num(c.nightly),pct=totalNights?Math.round(nights/totalNights*100):0;return `<div class="card city-card"><div class="emoji">${safe(c.emoji||'📍')}</div>${main.includes(c.city)?'<span class="badge">⭐ Cidade principal</span>':''}<label>Nome da cidade<input value="${safe(c.city)}" onchange="state.cities[${i}].city=this.value;renderAll(false);persistDraft()"></label><button class="small-btn ghost" onclick="state.cities[${i}].emoji=suggestEmoji(state.cities[${i}].city);renderAll(false);persistDraft()">Sugerir emoji</button><div class="grid grid2"><label>Check-in<input type="date" value="${c.start||''}" onchange="setCityStart(${i},this.value)"></label><label>Check-out<input type="date" min="${c.start||''}" value="${c.end||''}" onchange="state.cities[${i}].end=this.value;renderAll(false);persistDraft()"></label></div>${c.start&&c.end&&nights<=0?'<div class="error">Check-out deve ser posterior ao check-in.</div>':''}<label>Hospedagem<input value="${safe(c.hotel||'')}" onchange="state.cities[${i}].hotel=this.value;renderAll(false);persistDraft()"></label><div class="grid grid2"><label>Custo por diária<input type="number" min="0" value="${num(c.nightly)}" onchange="state.cities[${i}].nightly=num(this.value);renderAll(false);persistDraft()"></label><label>Status<select onchange="state.cities[${i}].status=this.value;renderAll(false);persistDraft()">${statusOptions(c.status||'Planejado')}</select></label></div><div class="grid grid2"><div><b>Diárias:</b> ${nights}</div><div><b>Total hospedagem:</b> ${money(total)}</div></div><div class="grid grid3"><div><b>Atrações:</b> ${cityAttractions(c.city)}</div><div><b>Restaurantes:</b> ${cityFoods(c.city)}</div><div><b>Despesas:</b> ${cityOthers(c.city)}</div></div><div><b>Distribuição:</b><div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div><small>${pct}% da viagem</small></div><div><b>Mini calendário:</b><div class="calendar-line">${calendarDays(c).map(d=>`<span class="calendar-day">${d}</span>`).join('')}</div></div><label>Observações<textarea onchange="state.cities[${i}].notes=this.value;persistDraft()">${safe(c.notes||'')}</textarea></label><button class="small-btn ghost" onclick="state.cities[${i}].notes=reflexive();renderAll(false);persistDraft()">Sugestão reflexiva</button><button class="small-btn danger" onclick="deleteCity(${i})">Excluir cidade</button></div>`}function calendarDays(c){let arr=[];if(!c.start||!c.end)return arr;let s=new Date(c.start+'T00:00'),e=new Date(c.end+'T00:00');for(let d=new Date(s);d<e;d.setDate(d.getDate()+1))arr.push(String(d.getDate()).padStart(2,'0'));return arr}function a ).join('');document.getElementById('transporte').innerHTML=`<h2>Transporte</h2><div class="toolbar"><input id="filterTransport" placeholder="Filtrar trajetos" oninput="filterRows('filterTransport','transportTable')"><button onclick="addTransport()">Adicionar trajeto</button></div><div class="table-wrap"><table id="transportTable"><thead><tr><th>Data</th><th>Horário</th><th>Origem cidade</th><th>Origem local</th><th>Destino cidade</th><th>Destino local</th><th>Meio</th><th>Tempo</th><th>Custo</th><th>Status</th><th>Período</th><th>Observações</th><th></th></tr></thead><tbody>${rows}</tbody></table></div>`}function addTransport(){state.transports.push({id:uid(),date:allPlanningDates()[0]?.date||datesFromCities()[0]?.date||'',time:'09:00',originCity:'',originPlace:'',destCity:'',destPlace:'',origin:'',dest:'',mode:'',duration:'',cost:0,status:'Planejado',notes:''});renderAll(false);persistDraft()}

ss="card daily-consolidated"><h3>Consolidado por dia</h3><div class="table-wrap"><table class="daily-summary-table"><thead><tr><th>Data</th><th>Cidade</th><th>Total alimentação</th></tr></thead><tbody>${cons}</tbody></table></div></div>`}function addFoodItem(date){if(!date){alert('Cadastre uma cidade com datas.');return}state.foodItems.push({id:uid(),date,city:cityForDate(date),type:'Outros',place:'',cost:0,status:'Planejado'});renderAll(false);persistDraft()}

atus</th><th>Total do dia</th><th></th></tr></thead><tbody>${rows}</tbody></table></div><br><div class="card daily-consolidated"><h3>Consolidado por dia</h3><div class="table-wrap"><table class="daily-summary-table"><thead><tr><th>Data</th><th>Cidade</th><th>Total atrações</th></tr></thead><tbody>${cons}</tbody></table></div></div>`}function addAttraction(date){if(!date){alert('Cadastre uma cidade com datas.');return}state.attractions.push({id:uid(),date,city:cityForDate(date),time:'09:00',period:'Manhã',name:'',cost:0,status:'Planejado'});renderAll(false);persistDraft()}
function renderOutras(){let rows=state.otherExpenses.sort((a,b)=>a.date.localeCompare(b.date)).map(x=>{let i=state.otherExpenses.indexOf(x);return`<tr class="${statusClass(x)}"><td><input type="date" value="${x.date||''}" onchange="state.otherExpenses[${i}].date=this.value;state.otherExpenses[${i}].city=cityForDate(this.value);renderAll(false);persistDraft()"></td><td>${safe(x.city)}</td><td><input value="${safe(x.name||'')}" onchange="updateArrayItem('otherExpenses',${i},'name',this.value)"></td><td><input type="number" value="${num(x.cost)}" onchange="updateArrayItem('otherExpenses',${i},'cost',this.value)"></td><td><select onchange="updateArrayItem('otherExpenses',${i},'status',this.value)">${statusOptions(x.status)}</select></td><td><button class="small-btn danger" onclick="deleteArrayItem('otherExpenses',${i})">Excluir</button></td></tr>`}).join('');let cons=datesFromCities().map(d=>`<tr><td>${fmtDate(d.date)}</td><td>${safe(d.city)}</td><td class="total-cell">${money(dayOther(d.date))}</td></tr>`).join('');document.getElementById('outras').innerHTML=`<h2>Outras despesas</h2><div class="toolbar"><input id="filterOther" placeholder="Filtrar despesas" oninput="filterRows('filterOther','otherTable')"><button onclick="addOther()">Adicionar despesa</button></div><div class="table-wrap"><table id="otherTable"><thead><tr><th>Data</th><th>Cidade</th><th>Despesa</th><th>Custo</th><th>Status</th><th></th></tr></thead><tbody>${rows}</tbody></table></div><br><div class="card daily-consolidated"><h3>Consolidado por dia</h3><div class="table-wrap"><table class="daily-summary-table"><thead><tr><th>Data</th><th>Cidade</th><th>Total outras despesas</th></tr></thead><tbody>${cons}</tbody></table></div></div>`}function addOther(){let date=datesFromCities()[0]?.date||'';state.otherExpenses.push({id:uid(),date,city:cityForDate(date),name:'',cost:0,status:'Planejado'});renderAll(false);persistDraft()}
function renderChecklist(){let cs=checklistStats();let rows=state.checklist.map((x,i)=>`<tr class="${x.status==='Cancelado'?'status-cancelado':''}"><td><input type="checkbox" ${x.done?'checked':''} onchange="state.checklist[${i}].done=this.checked;state.checklist[${i}].status=this.checked?'Concluído':'Pendente';renderAll(false);persistDraft()"></td><td><select onchange="updateArrayItem('checklist',${i},'category',this.value)">${categoryOptions(x.category)}</select></td><td><input value="${safe(x.item||'')}" onchange="updateArrayItem('checklist',${i},'item',this.value)"></td><td><input value="${safe(x.responsible||'')}" onchange="updateArrayItem('checklist',${i},'responsible',this.value)"></td><td><select onchange="updateArrayItem('checklist',${i},'priority',this.value)">${priorityOptions(x.priority)}</select></td><td><select onchange="updateArrayItem('checklist',${i},'status',this.value)">${statusChecklistOptions(x.status)}</select></td><td><input value="${safe(x.notes||'')}" onchange="updateArrayItem('checklist',${i},'notes',this.value)"></td><td><button class="small-btn danger" onclick="deleteArrayItem('checklist',${i})">Excluir</button></td></tr>`).join('');document.getElementById('checklist').innerHTML=`<h2>Checklist</h2><div class="grid grid4"><div class="card kpi"><span>Total</span><strong>${cs.total}</strong></div><div class="card kpi"><span>Concluídos</span><strong>${cs.done}</strong></div><div class="card kpi"><span>Pendentes</span><strong>${cs.pending}</strong></div><div class="card kpi"><span>Conclusão</span><strong>${cs.pct}%</strong></div></div><br><div class="toolbar"><input id="filterCheck" placeholder="Busca livre" oninput="filterRows('filterCheck','checkTable')"><button onclick="addChecklist()">Adicionar item</button><button onclick="seedChecklist()">Inserir sugestões padrão</button></div><div class="table-wrap"><table id="checkTable"><thead><tr><th>OK</th><th>Categoria</th><th>Item</th><th>Responsável</th><th>Prioridade</th><th>Status</th><th>Observações</th><th></th></tr></thead><tbody>${rows}</tbody></table></div>`}function addChecklist(item=''){state.checklist.push({id:uid(),category:'Outros',item:item,responsible:'',priority:'Média',status:'Pendente',notes:'',done:false});renderAll(false);persistDraft()}function seedChecklist(){['Roupas leves','Casaco','Calçados confortáveis','Itens de higiene','Adaptador de tomada','Passaporte','Seguro viagem','Comprovantes de hospedagem','Passagens','Reservas de atrações','Remédios de uso contínuo','Cartão internacional','Power bank','Carregador'].forEach(addChecklist)}
function pieStyle(t){let total=t.total||1,a=t.lodging/total*360,b=a+t.food/total*360,c=b+t.att/total*360,d=c+t.trans/total*360;return`--a:${a}deg;--b:${b}deg;--c:${c}deg;--d:${d}deg`}
function expenseStatusTotals(){let labels=['Planejado','Reservado','Pago','Cancelado'],values=Object.fromEntries(labels.map(l=>[l,0])),counts=Object.fromEntries(labels.map(l=>[l,0]));function normStatus(s){s=String(s||'Planejado');return labels.includes(s)?s:'Planejado'}function add(status,value){let st=normStatus(status);values[st]+=num(value);counts[st]+=1}state.cities.forEach(c=>add(c.status,daysBetween(c.start,c.end)*num(c.nightly)));[...state.transports,...state.foodItems,...state.attractions,...state.otherExpenses].forEach(x=>add(x.status,num(x.cost)));let total=labels.reduce((sum,l)=>sum+values[l],0);return labels.map(l=>({label:l,value:values[l],count:counts[l],pct:total?values[l]/total*100:0}))}
function setCostView(view){state.settings.costView=view;renderAll(false);persistDraft()}
function costRowsByView(view,t,dates){dates=dates||allPlanningDates();if(view==='cidade'){let map={};dates.forEach(d=>{let city=d.city||inferCityForDate(d.date)||'Sem cidade';map[city]=(map[city]||0)+dayLodging(d.date)+dayFood(d.date)+dayAttractions(d.date)+dayOther(d.date)});state.transports.forEach(x=>{if(isCanceled(x))return;let d=getTransportDate(x),city=inferCityForDate(d)||getTransportDest(x)||getTransportOrigin(x)||'Sem cidade';map[city]=(map[city]||0)+getTransportCost(x)});return Object.entries(map).map(([name,value])=>({name,value})).sort((a,b)=>b.value-a.value)}if(view==='dia'){return dates.map(d=>({name:fmtDate(d.date)+' — '+(d.city||inferCityForDate(d.date)||''),value:dayTotal(d.date)})).filter(r=>num(r.value)>0||r.name.trim())}return [{name:'Hospedagem',value:t.lodging,cls:'c1'},{name:'Alimentação',value:t.food,cls:'c2'},{name:'Atrações',value:t.att,cls:'c3'},{name:'Transporte',value:t.trans,cls:'c4'},{name:'Outros',value:t.other,cls:'c5'}]}
function palette(i){return ['#2563eb','#10b981','#f59e0b','#7c3aed','#ef4444','#06b6d4','#84cc16','#f97316','#a855f7','#14b8a6'][i%10]}
function pieFromRows(rows){let total=rows.reduce((s,r)=>s+num(r.value),0)||1,acc=0,parts=[];rows.forEach((r,i)=>{let deg=num(r.value)/total*360,from=acc,to=acc+deg;parts.push(`${palette(i)} ${from}deg ${to}deg`);acc=to});return `background:conic-gradient(${parts.join(',')||'#e2e8f0 0deg 360deg'})`}
function dataBars(rows){let max=Math.max(1,...rows.map(r=>num(r.value)));return `<div class="status-bars cost-bars">${rows.map((r,i)=>`<div class="status-bar-row cost-bar-row"><span><b>${safe(r.name)}</b></span><div class="status-bar-track"><div class="status-bar-fill" style="width:${Math.max(2,num(r.value)/max*100)}%;background:${palette(i)}"></div></div><b>${money(r.value)}</b></div>`).join('')}</div>`}
function renderCostChart(view,rows,total){if(view==='dia'){return dataBars(rows)}return `<div class="pie-wrap"><div class="pie dynamic-pie" style="${pieFromRows(rows)}"></div><div class="legend">${rows.map((r,i)=>`<div><span style="background:${palette(i)}"></span><b>${safe(r.name)}</b>: ${money(r.value)} — ${((num(r.value)/(total||1))*100).toFixed(1)}%</div>`).join('')}</div></div>`}
function costRowsTable(view,t,dates,trav,extraClass=''){let rows=costRowsByView(view,t,dates),viewLabel=view==='cidade'?'Cidade':(view==='dia'?'Dia':'Categoria');return `<table class="cost-print-table ${extraClass}"><thead><tr><th>${viewLabel}</th><th>Valor</th><th>%</th><th>Por pessoa</th></tr></thead><tbody>${rows.map(r=>`<tr><td>${safe(r.name)}</td><td class="total-cell">${money(r.value)}</td><td>${((num(r.value)/(t.total||1))*100).toFixed(1)}%</td><td>${money(num(r.value)/trav)}</td></tr>`).join('')}</tbody></table>`}
function renderCustos(){const t=totals(),dates=allPlanningDates(),trav=Math.max(1,num(state.settings.travelers)||1),view=state.settings.costView||'categoria',statusData=expenseStatusTotals(),maxStatus=Math.max(1,...statusData.map(s=>s.value));let rowsData=costRowsByView(view,t,dates),viewLabel=view==='cidade'?'cidade':(view==='dia'?'dia':'categoria'),chartTitle=view==='dia'?'Gráfico de barras por dia':`Gráfico de pizza por ${viewLabel}`,tableTitle=`Valores por ${viewLabel}`;let dataRows=rowsData.map(r=>`<tr><td>${safe(r.name)}</td><td class="total-cell">${money(r.value)}</td><td>${((num(r.value)/(t.total||1))*100).toFixed(1)}%</td><td>${money(num(r.value)/trav)}</td></tr>`).join('');let statusBars=statusData.map(s=>`<div class="status-bar-row"><span><b>${s.label}</b></span><div class="status-bar-track"><div class="status-bar-fill status-${s.label.toLowerCase()}" style="width:${Math.max(2,(s.value/maxStatus)*100)}%"></div></div><b>${money(s.value)}</b></div>`).join('');let statusRows=statusData.map(s=>`<tr><td>${s.label}</td><td>${s.count}</td><td class="total-cell">${money(s.value)}</td><td>${s.pct.toFixed(1)}%</td></tr>`).join('');let printTables=`<div class="print-only-costs"><div class="cost-print-grid"><div class="card cost-print-card"><h3>Valores por categoria</h3><div class="table-wrap">${costRowsTable('categoria',t,dates,trav,'cost-by-category-table')}</div></div><div class="card cost-print-card"><h3>Valores por cidade</h3><div class="table-wrap">${costRowsTable('cidade',t,dates,trav,'cost-by-city-table')}</div></div><div class="card cost-print-card day-table"><h3>Valores por dia</h3><div class="table-wrap">${costRowsTable('dia',t,dates,trav,'cost-by-day-table')}</div></div></div></div>`;document.getElementById('custos').innerHTML=`<h2>Custos</h2><div class="grid grid4"><div class="card kpi"><span>Total geral</span><strong>${money(t.total)}</strong></div><div class="card kpi"><span>Por pessoa</span><strong>${money(t.total/trav)}</strong></div><div class="card kpi"><span>Média por dia</span><strong>${money(t.total/(dates.length||1))}</strong></div><div class="card kpi"><span>Média por pessoa/dia</span><strong>${money(t.total/(trav*(dates.length||1)))}</strong></div></div><br><div class="card interactive-cost-panel"><div class="toolbar cost-toggle no-print"><button class="${view==='categoria'?'active-toggle':''}" onclick="setCostView('categoria')">Categoria</button><button class="${view==='cidade'?'active-toggle':''}" onclick="setCostView('cidade')">Cidade</button><button class="${view==='dia'?'active-toggle':''}" onclick="setCostView('dia')">Dia</button></div><div class="grid grid2"><div><h3>${chartTitle}</h3>${renderCostChart(view,rowsData,t.total)}</div><div><h3>${tableTitle}</h3><div class="table-wrap"><table class="cost-main-table"><thead><tr><th>${viewLabel.charAt(0).toUpperCase()+viewLabel.slice(1)}</th><th>Valor</th><th>%</th><th>Por pessoa</th></tr></thead><tbody>${dataRows}</tbody></table></div></div></div></div>${printTables}<br><div class="grid grid2 cost-status-section"><div class="card status-graph-card"><h3>Gráfico de barras — status do gasto</h3><div class="status-bars">${statusBars}</div><p class="hint">Valores cancelados aparecem para controle, mas não entram no total geral.</p></div><div class="card"><h3>Status do gasto</h3><div class="table-wrap"><table class="cost-status-table"><thead><tr><th>Status</th><th>Itens</th><th>Valor</th><th>%</th></tr></thead><tbody>${statusRows}</tbody></table></div></div></div>`}

function versions(){try{return JSON.parse(localStorage.getItem(STORAGE_VERSIONS)||'[]')}catch(e){return[]}}function saveVersions(v){localStorage.setItem(STORAGE_VERSIONS,JSON.stringify(v))}function versionMeta(name){const t=totals(),dates=allPlanningDates();return{id:uid(),name,date:new Date().toLocaleString('pt-BR'),city:mainCities().join(', ')||'-',days:dates.length,cities:uniqueCities().length,total:t.total,data:structuredClone(state)}}function saveVersion(){let vs=versions(),suggest=`${autoTitle()} - ${new Date().toLocaleString('pt-BR')}`;let name=prompt('Nome da versão:',suggest);if(!name)return;if(state.settings.currentVersionId&&confirm('Sobrescrever a versão carregada? Clique em Cancelar para salvar como nova.')){let idx=vs.findIndex(v=>v.id===state.settings.currentVersionId);if(idx>=0){vs[idx]=versionMeta(name);vs[idx].id=state.settings.currentVersionId}}else{let v=versionMeta(name);state.settings.currentVersionId=v.id;vs.push(v)}saveVersions(vs);persistDraft();alert('Versão salva.')}function openVersions(){let vs=versions();document.getElementById('modalTitle').textContent='Versões salvas';document.getElementById('modalContent').innerHTML=`<div class="toolbar"><input id="versionSearch" placeholder="Pesquisar versões" oninput="filterRows('versionSearch','versionTable')"></div><div class="table-wrap"><table id="versionTable"><thead><tr><th>Nome</th><th>Data/hora</th><th>Cidade</th><th>Dias</th><th>Custo</th><th>Ações</th></tr></thead><tbody>${vs.map(v=>`<tr><td>${safe(v.name)}</td><td>${safe(v.date)}</td><td>${safe(v.city)}</td><td>${v.days}</td><td>${money(v.total)}</td><td><button class="small-btn" onclick="loadVersion('${v.id}')">Carregar</button><button class="small-btn danger" onclick="deleteVersion('${v.id}')">Excluir</button></td></tr>`).join('')}</tbody></table></div>`;openModal()}function loadVersion(id){let v=versions().find(v=>v.id===id);if(!v)return;if(confirm('Carregar esta versão e substituir os dados atuais?')){state=normalizeState(structuredClone(v.data));state.settings.currentVersionId=id;closeModal();renderAll(true);persistDraft()}}function deleteVersion(id){if(!confirm('Excluir esta versão?'))return;saveVersions(versions().filter(v=>v.id!==id));openVersions()}function openModal(){document.getElementById('modalBackdrop').classList.add('show');setTimeout(labelTables,0)}function closeModal(){document.getElementById('modalBackdrop').classList.remove('show')}function openClearOptions(){document.getElementById('modalTitle').textContent='Restaurar / limpar';document.getElementById('modalContent').innerHTML=`<p>Escolha o tipo de limpeza.</p><button onclick="clearCurrent()">Limpar apenas dashboard atual</button> <button class="danger" onclick="clearAll()">Apagar tudo, inclusive versões</button>`;openModal()}function clearCurrent(){if(confirm('Limpar apenas o dashboard atual?')){state=blankState();persistDraft();closeModal();renderAll(true)}}function clearAll(){if(confirm('Apagar dashboard atual e todas as versões?')){localStorage.removeItem(STORAGE_DRAFT);localStorage.removeItem(STORAGE_VERSIONS);state=blankState();closeModal();renderAll(true)}}function exportJSON(){downloadFile(`dados-viagem-${(mainCities()[0]||'sem-cidade').replace(/\s+/g,'-')}.json`,JSON.stringify(state,null,2),'application/json')}function importJSON(ev){let file=ev.target.files[0];if(!file)return;let reader=new FileReader();reader.onload=()=>{try{let obj=JSON.parse(reader.result);if(!obj||!Array.isArray(obj.cities))throw new Error('Estrutura inválida');if(confirm('Importar dados e substituir o dashboard atual?')){state=normalizeState(obj);persistDraft();renderAll(true)}}catch(e){alert('Arquivo JSON inválido.')}};reader.readAsText(file)}function downloadFile(name,content,type){let blob=new Blob([content],{type});let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;document.body.appendChild(a);a.click();setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove()},500)}function printCurrent(){let active=document.querySelector('section.active');document.body.classList.add('print-current');document.querySelectorAll('section').forEach(s=>s.classList.remove('print-target'));active.classList.add('print-target');setTimeout(()=>window.print(),60);setTimeout(()=>{document.body.classList.remove('print-current');active.classList.remove('print-target')},800)}function printAll(){document.body.classList.remove('print-current');document.querySelectorAll('section').forEach(s=>s.classList.add('active'));setTimeout(()=>window.print(),60);setTimeout(()=>renderAll(false),800)}
renderNav();renderAll(true);persistDraft();window.addEventListener('resize',adjustMobileSubtitleMarquee);window.addEventListener('orientationchange',()=>setTimeout(adjustMobileSubtitleMarquee,250));
